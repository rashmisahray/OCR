<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionOCR | Intelligent AI Text Extraction</title>
    <meta name="description" content="Transform images into editable text instantly with VisionOCR. High-precision AI-powered text extraction.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-bolt-lightning"></i>
                <h1>Vision<span>OCR</span></h1>
            </div>
            <p class="tagline">The future of document digitizing is here</p>
        </header>

        <section class="upload-section">
            <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-label="Upload Image">
                <div class="drop-zone-content">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <h3>Drop your image here</h3>
                    <p>Supported: JPG, PNG, BMP, GIF</p>
                    <p>Or <span>click to browse</span></p>
                    <input type="file" id="file-input" hidden accept="image/*">
                </div>
                <div id="preview-container" class="preview-container hidden">
                    <img id="image-preview" src="" alt="OCR Preview">
                    <button id="remove-img" class="remove-btn" aria-label="Remove image">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>

            <button id="extract-btn" class="extract-btn" disabled>
                <span class="btn-text">Extract Intelligence</span>
                <span class="loader hidden"></span>
            </button>
        </section>

        <section id="result-section" class="result-section hidden">
            <div class="result-header">
                <h3>Insights Found</h3>
                <div class="result-actions">
                    <button id="copy-btn" title="Copy Text" aria-label="Copy extracted text"><i class="fa-regular fa-copy"></i></button>
                    <button id="download-btn" title="Download Text" aria-label="Download as text file"><i class="fa-solid fa-arrow-down-to-bracket"></i></button>
                </div>
            </div>
            <div class="result-body">
                <textarea id="output-text" placeholder="Extracting text from image..." readonly aria-label="Extracted text"></textarea>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 VisionOCR. Crafted with <i class="fa-solid fa-heart" style="color: var(--accent);"></i> for visual excellence.</p>
        </footer>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
